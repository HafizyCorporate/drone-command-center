<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wahana Vision Simulator</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #0f0; font-family: monospace; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .hud { border: 2px solid #0f0; padding: 15px; border-radius: 10px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 0 15px #0f0; }
        #camera-feed { width: 100%; height: 180px; background: #111; border: 1px solid #0f0; margin-bottom: 10px; object-fit: cover; }
        button { background-color: #0f0; color: #000; border: none; padding: 15px; font-size: 16px; font-weight: bold; width: 100%; border-radius: 5px; cursor: pointer; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px; font-size: 14px; }
        #log { margin-top: 10px; font-size: 11px; color: #0f0; height: 30px; }
    </style>
</head>
<body>
    <div class="hud">
        <video id="camera-feed" autoplay playsinline></video>
        <div class="data-grid">
            <div>LAT: <span id="lat">-</span></div>
            <div>LNG: <span id="lng">-</span></div>
        </div>
        <button onclick="startMission()">AKTIFKAN VISION & GPS</button>
        <div id="log">STANDBY...</div>
    </div>

    <script>
        const SECRET_KEY = "X-Secur3-Dr0n3-2026"; 
        const video = document.getElementById('camera-feed');

        // Nyalakan Kamera
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { document.getElementById('log').innerText = "Kamera diblokir!"; });

        function startMission() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(sendFullData);
            }
        }

        function sendFullData(pos) {
            const log = document.getElementById('log');
            log.innerText = "MENGIRIM TELEMETRI + VISION...";
            
            document.getElementById('lat').innerText = pos.coords.latitude.toFixed(5);
            document.getElementById('lng').innerText = pos.coords.longitude.toFixed(5);

            fetch('/api/telemetry', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-drone-secret-key': SECRET_KEY },
                body: JSON.stringify({ 
                    lat: pos.coords.latitude, 
                    lng: pos.coords.longitude, 
                    alt: 20, 
                    battery: 88 
                })
            })
            .then(res => res.json())
            .then(data => { log.innerText = "MARKAS MENERIMA DATA!"; })
            .catch(err => { log.innerText = "KONEKSI PUTUS!"; });
        }
    </script>
</body>
</html>
